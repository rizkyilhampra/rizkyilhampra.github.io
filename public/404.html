<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirecting...</title>
  </head>
  <body>
    <script>
      sessionStorage.setItem(
        "spa-redirect",
        location.pathname + location.search + location.hash
      );
      location.replace("/");
    </script>
  </body>
</html>
