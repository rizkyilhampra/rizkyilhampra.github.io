    <script>
      (function () {
        var params = new URLSearchParams(location.search);
        var redirect = params.get("spa-redirect");
        if (!redirect) return;

        try {
          var url = new URL(redirect, location.origin);
          var pathname = url.pathname.replace(/\/+$/, "") || "/";
          var isGardenRoute =
            pathname === "/til" ||
            /^\/til\/[^/.]+$/.test(pathname) ||
            pathname === "/til/tags" ||
            /^\/til\/tags\/[^/.]+$/.test(pathname);

          if (url.origin === location.origin && isGardenRoute) {
            history.replaceState(null, "", url.pathname + url.search + url.hash);
          }
        } catch (error) {}
      })();
    </script>
